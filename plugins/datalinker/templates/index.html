{% extends base_template %}
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

{% block title %}

{% endblock %}

{% block content %}

<h2> Datalinker datasets </h2>
<a class="action" href="{{ url_for('.create') }}">Create dataset </a>

{% for dataset in datasets %}
  <article>
    <header>
      <div>
        <h3> <a href="{{ url_for('.config', dataset_id=dataset['id']) }}">{{ dataset['title'] }}</a></h1>
        <div> created on {{ dataset['created'][0:19] }}</div>
      </div>
        <a class="action" href="{{ url_for('.edit', dataset_id=dataset['id']) }}">Edit</a>
        <a class="action" href="{{ url_for('.config', dataset_id=dataset['id']) }}">Open</a>
    </header>
    <p class="body">{{ dataset['description'] }} </p>
    <hr>
  </article>
{% endfor %}

<article class="project">
    <form >
        <input type='file' name='raw_data_file' >
        <input type='file' name='preproc_ops_file'> 
        <input type="submit" value="Generate DAG" formmethod="post">  
    </form>
  </article>
{% endblock %}
