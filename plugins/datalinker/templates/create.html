{% extends base_template %}

{% block content %}
<h2> New dataset </h2>
  <form method="post" enctype="multipart/form-data">
    <label for="title">Dataset ID</label>
    <input name="dataset_id" id="dataset_id" value="{{ request.form['dataset_id'] }}" required>
    <label for="title">Title</label>
    <input name="title" id="title" value="{{ request.form['title'] }}" required>
    <br>
    <label for="body">Description</label>
    <textarea name="body" id="body" required>{{ request.form['body'] }}</textarea>
    <br>
    <input type='file' name='file' required >
    <br>
      <input type="submit" value="Save and upload">
  </form>
  <form action="{{ url_for('.index') }}" method="get">
    <input type="submit" value="Cancel" >
  </form>
  
{% endblock %}
