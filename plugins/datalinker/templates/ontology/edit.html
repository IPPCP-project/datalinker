{% extends base_template %}

{% block content %}
<div class="col-sm-12">
<div class="row">
  <div class="col-sm-12">
    <h4> <a href="{{url_for('.pj_index')}}"><small>Datalinker</small></a> {{ project['title'] }}</h4>
  </div>
</div>
<div class="row">
  <div class="col-sm-12">
    <h4>Edit project </h4>
  </div>
</div>
<div class="row">
  <form class="form-horizontal" action="" method="post" role="form">
    <div class="form-group">
      <label class="col-sm-2 control-label" for="title">Project ID</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" name="project_id" id="project_id" value="{{ project_id }}" disabled>
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-2 control-label" for="title">Title</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" name="title" id="title" value="{{ request.form['title'] or project['title'] }}" required>
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-2 control-label" for="body">Use case definition</label>
      <div class="col-sm-8">
        <textarea class="form-control" name="body" id="body" rows="2" required>{{ request.form['body'] or project['use_case'] }}</textarea>
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-2 control-label" for="d_reqs">Data requirements</label>
      <div class="col-sm-8" id="d_reqs-list">
      {% for requirement in data_requirements %}
        <div class="input-group">
          <input class="form-control" value="{{ requirement['data_requirement'] }}" name="d_reqs">
          <span class="input-group-btn">
            <button id="remove-item-btn" class="btn btn-danger remove-item-btn " style="margin-bottom:5px" formnovalidate>
              <span class="glyphicon glyphicon-trash"></span>
            </button>
          </span>
        </div>
      {% endfor %}
      </div>
    <div class="col-sm-offset-2 col-sm-8">
        <button class="btn btn-success add-req-button" formnovalidate><span class="glyphicon glyphicon-plus" aria-hidden="true"></span></button>
    </div>
    </div>
    <div class="form-group">
      <label class="col-sm-2 control-label" for="d_sources">Data sources</label>
      <div class="col-sm-8" id="sources-list">
      {% for source in data_sources %}
        <div class="input-group">
          <input class="form-control" value="{{ source['data_source'] }}" name="d_sources">
          <span class="input-group-btn">
            <button id="remove-item-btn" class="btn btn-danger remove-item-btn " style="margin-bottom:5px" formnovalidate>
              <span class="glyphicon glyphicon-trash"></span>
            </button>
          </span>
        </div>
      {% endfor %}
      </div>
    <div class="col-sm-offset-2 col-sm-8">
        <button class="btn btn-success add-source-button" formnovalidate><span class="glyphicon glyphicon-plus" aria-hidden="true"></span></button>
    </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-8">
        <input class="btn btn-primary" type="submit" value="Save" formmethod="post">
        <input class="btn btn-secondary" type="submit" value="Cancel" formaction="{{(url_for('.pj_index'))}}" formmethod="get" formnovalidate>  
      </div>
    </div>
  </form> 
  <hr>
  <form class="form-horizontal" action="{{ url_for('.pj_delete', project_id=project_id) }}" method="POST" role="form">
    <div class="col-sm-offset-9 col-sm-1">
      <input class="btn btn-danger danger" type="submit" value="Delete" onclick="return confirm('Are you sure?');">
    </div>
  </form>
</div>
</div>

<script>
  $(document).ready(function(){
    $(".add-req-button").click(function(e){
      e.preventDefault();
      $("#d_reqs-list").append(`
      <div class="input-group">
        <input class="form-control" placeholder="Put here your data requirement" name="d_reqs">
        <span class="input-group-btn">
          <button id="remove-item-btn" class="btn btn-danger remove-item-btn " style="margin-bottom:5px" formnovalidate>
            <span class="glyphicon glyphicon-trash"></span>
          </button>
        </span>
      </div>
      `);
    });
    $(".add-source-button").click(function(e){
      e.preventDefault();
      $("#sources-list").append(`
      <div class="input-group">
        <input class="form-control" placeholder="Put here your data sources url" name="d_sources">
        <span class="input-group-btn">
          <button id="remove-item-btn" class="btn btn-danger remove-item-btn " style="margin-bottom:5px" formnovalidate>
            <span class="glyphicon glyphicon-trash"></span>
          </button>
        </span>
      </div>
      `);
    });
    $(document).on('click', '.remove-item-btn', function(e) {
      e.preventDefault();
      let row_item = $(this).parent().parent();
      $(row_item).remove();
    })
  })
</script>

{% endblock %}
