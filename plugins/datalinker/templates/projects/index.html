{% extends base_template %}
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

{% block title %}

{% endblock %}

{% block content %}

<h2> Datalinker projects </h2>
<a class="action" href="{{ url_for('.pj_create') }}">New </a>

{% for project in projects %}
  <article>
    <header>
      <div>
        <h3> <a href="{{ url_for('.ds_index', project_id=project['project_id']) }}">{{ project['title'] }}</a></h1>
        <div> created on {{ project['created'][0:10] }}</div>
      </div>
        <a class="action" href="{{ url_for('.pj_edit', project_id=project['project_id']) }}">Edit</a>
        <a class="action" href="{{ url_for('.ds_index', project_id=project['project_id']) }}">Open</a>
    </header>
    <p class="body">{{ project['description'] }} </p>
    <hr>
  </article>
{% endfor %}

{% endblock %}
