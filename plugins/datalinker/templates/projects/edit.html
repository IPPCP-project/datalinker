{% extends base_template %}

{% block content %}
<h2>Edit "{{ project['title'] }}"</h2>
  <form action="" method="post">
    <label for="title">Project ID</label>
    <input name="project_id" id="project_id" value="{{ project_id }}" disabled>
    <label for="title">Title</label>
    <input name="title" id="title" value="{{ request.form['title'] or project['title'] }}" required>
    <br>
    <label for="body">Description</label>
    <textarea name="body" id="body" required>{{ request.form['body'] or project['description'] }}</textarea>
    <br>
    <div>
      <input type="submit" value="Save" formmethod="post">
      <input type="submit" value="Cancel" formaction="{{(url_for('.pj_index'))}}" formmethod="get">  
    </div>
  </form> 
  <hr>
  <form action="{{ url_for('.pj_delete', project_id=project_id) }}" method="POST">
    <input class="danger" type="submit" value="Delete" onclick="return confirm('Are you sure?');">
  </form>
{% endblock %}
