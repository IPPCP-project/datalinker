{% extends base_template %}

{% block content %}
<div class="col-sm-12">
  <div class="row">
    <div class="col-sm-12">
      <h4> <a href="{{url_for('.pj_index')}}"><small>Datalinker</small></a> {{ project['title'] }} </h4>
    </div>
  </div>
  <div class="row">
    <div class="col-sm-12">
      <h4> New dataset </h4>
    </div>
  </div>
  <div class="row">
    <form class="form-horizontal" method="post" enctype="multipart/form-data" role="form">
      <div class="form-group">
        <label class="col-sm-2 control-label" for="title">Dataset ID</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" name="dataset_id" id="dataset_id" value="{{ request.form['dataset_id'] }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label" for="title">Title</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" name="title" id="title" value="{{ request.form['title'] }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label" for="body">Description</label>
        <div class="col-sm-8">
          <textarea class="form-control" name="body" id="body" required>{{ request.form['body'] }}</textarea>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label" for="body">File</label>
        <div class="col-sm-8">
          <input class="form-control-file" type='file' name='file' required >
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-8">
          <input class="btn btn-primary" type="submit" value="Save and upload">
          <input class="btn btn-secondary" type="submit" value="Cancel" formaction="{{ url_for('.ds_index', project_id=project_id) }}" formmethod="get" formnovalidate>
        </div>
      </div>
    </form>
  </div>
</div>    
{% endblock %}
