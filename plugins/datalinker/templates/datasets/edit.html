{% extends base_template %}

{% block content %}
<div class="col-sm-12">
<div class="row">
  <div class="col-sm-12">
    <h4> <a href="{{url_for('.pj_index')}}"><small>Datalinker</small></a> <a href="{{url_for('.ds_index', project_id=project_id)}}">{{ project['title'] }}</a> &rsaquo; {{ dataset['title'] }}</h4>
  </div>
</div>
<div class="row">
  <div class="col-sm-12">
    <h4>Edit dataset</h4>
  </div>
</div>
<div class="row">
  <form class="form-horizontal" action="" method="post" role="form">
    <div class="form-group">
      <label class="col-sm-2 control-label" for="title">Dataset ID</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" name="dataset_id" id="dataset_id" value="{{ dataset_id }}" disabled>
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-2 control-label" for="title">Title</label>
      <div class="col-sm-8">
        <input type="text" class="form-control" name="title" id="title" value="{{ request.form['title'] or dataset['title'] }}" required>
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-2 control-label" for="body">Description</label>
      <div class="col-sm-8">
        <textarea class="form-control" name="body" id="body" rows="2" required>{{ request.form['body'] or dataset['description'] }}</textarea>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-8">
        <input class="btn btn-primary" type="submit" value="Save" formmethod="post">
        <input class="btn btn-secondary" type="submit" value="Cancel" formaction="{{(url_for('.ds_index', project_id=dataset['project_id']))}}" formmethod="get" formnovalidate>    
      </div>
    </div>
  </form> 
  <hr>
  <form class="form-horizontal" action="{{ url_for('.ds_delete', project_id=dataset['project_id'], dataset_id=dataset_id) }}" method="POST" role="form">
    <div class="col-sm-offset-9 col-sm-1">
      <input class="btn btn-danger danger" type="submit" value="Delete" onclick="return confirm('Are you sure?');">
    </div>
    </form>
</div>
</div>
{% endblock %}
